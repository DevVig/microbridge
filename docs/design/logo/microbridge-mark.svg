<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-label="Microbridge">
  <title>Microbridge</title>
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17171D"/>
      <stop offset="1" stop-color="#0B0B0E"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.5" cy="0.16" r="0.9">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="0.55" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bridge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6AA2FF"/>
      <stop offset="1" stop-color="#3574F0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3D7EFF" stop-opacity="0.9"/>
      <stop offset="0.45" stop-color="#3D7EFF" stop-opacity="0.32"/>
      <stop offset="1" stop-color="#3D7EFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- squircle tile (inset to Apple's ~10% margin) -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#tile)"/>
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#sheen)"/>
  <rect x="101.5" y="101.5" width="821" height="821" rx="183.5" fill="none" stroke="#FFFFFF" stroke-opacity="0.06" stroke-width="3"/>

  <!-- arched legs: two spans on three piers (aqueduct read) -->
  <path fill="none" stroke="url(#bridge)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"
        d="M 306 648 V 545 A 103 103 0 0 1 512 545 V 648 M 512 545 A 103 103 0 0 1 718 545 V 648"/>

  <!-- deck / roadway (bold bar resting on the arches) -->
  <rect x="266" y="400" width="492" height="46" rx="23" fill="url(#bridge)"/>

  <!-- live-signal node: a lit marker on the deck center, plumb over the center pier -->
  <circle cx="512" cy="410" r="92" fill="url(#glow)"/>
  <circle cx="512" cy="410" r="26" fill="#FFFFFF"/>
  <circle cx="512" cy="410" r="26" fill="none" stroke="#3D7EFF" stroke-opacity="0.28" stroke-width="6"/>
</svg>
